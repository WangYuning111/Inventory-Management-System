<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Inventory Management System</h1>
            <p class="author">Author: Yuning Wang | Student ID: 24832834</p>
        </header>

        <div id="message"></div>

        <section class="form-section">
            <h2>Item Details</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label for="itemId">Item ID *</label>
                    <input type="text" id="itemId" placeholder="Enter unique ID">
                </div>
                <div class="form-group">
                    <label for="itemName">Item Name *</label>
                    <input type="text" id="itemName" placeholder="Enter item name">
                </div>
                <div class="form-group">
                    <label for="category">Category *</label>
                    <select id="category">
                        <option value="">Select Category</option>
                        <option value="Electronics">Electronics</option>
                        <option value="Furniture">Furniture</option>
                        <option value="Clothing">Clothing</option>
                        <option value="Tools">Tools</option>
                        <option value="Miscellaneous">Miscellaneous</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="quantity">Quantity *</label>
                    <input type="number" id="quantity" min="0" placeholder="Enter quantity">
                </div>
                <div class="form-group">
                    <label for="price">Price ($) *</label>
                    <input type="number" id="price" min="0" step="0.01" placeholder="Enter price">
                </div>
                <div class="form-group">
                    <label for="supplierName">Supplier Name *</label>
                    <input type="text" id="supplierName" placeholder="Enter supplier name">
                </div>
                <div class="form-group">
                    <label for="stockStatus">Stock Status *</label>
                    <select id="stockStatus">
                        <option value="">Select Status</option>
                        <option value="In Stock">In Stock</option>
                        <option value="Low Stock">Low Stock</option>
                        <option value="Out of Stock">Out of Stock</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="popularItem">Popular Item *</label>
                    <select id="popularItem">
                        <option value="">Select</option>
                        <option value="Yes">Yes</option>
                        <option value="No">No</option>
                    </select>
                </div>
                <div class="form-group full-width">
                    <label for="comment">Comment</label>
                    <textarea id="comment" rows="2" placeholder="Optional comment"></textarea>
                </div>
            </div>
            <div class="button-group">
                <button id="addBtn" onclick="addItem()">Add Item</button>
                <button id="updateBtn" onclick="updateItem()" style="display:none">Update Item</button>
                <button id="cancelBtn" onclick="cancelEdit()" style="display:none" class="secondary">Cancel</button>
            </div>
        </section>

        <section class="operations-section">
            <h2>Operations</h2>
            
            <div class="operation-box">
                <h3>Update Item (Search by Name)</h3>
                <div class="inline-form">
                    <input type="text" id="updateItemName" placeholder="Enter item name to update">
                    <button onclick="findItemToUpdate()">Find & Load</button>
                </div>
            </div>

            <div class="operation-box">
                <h3>Delete Item (Search by Name)</h3>
                <div class="inline-form">
                    <input type="text" id="deleteItemName" placeholder="Enter item name to delete">
                    <button onclick="deleteItem()" class="danger">Delete</button>
                </div>
            </div>

            <div class="operation-box">
                <h3>Search Items</h3>
                <div class="inline-form">
                    <input type="text" id="searchName" placeholder="Enter name to search">
                    <button onclick="searchItems()">Search</button>
                </div>
            </div>

            <div class="operation-box">
                <h3>Display Options</h3>
                <div class="button-group">
                    <button onclick="displayAllItems()">Show All Items</button>
                    <button onclick="displayPopularItems()">Show Popular Items</button>
                </div>
            </div>
        </section>

        <section class="output-section">
            <h2>Inventory Data</h2>
            <div id="output"></div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
